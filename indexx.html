        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/d/d3/Statue_of_Liberty%2C_NY.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .general {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            min-width: 150px;
            min-height: 100px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 5px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: none;
        }

        /* index badge */
        .card-index {
            position: absolute;
            top: -10px;
            left: -10px;
            font-size: 10px;
            font-weight: bold;
            color: #555;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            display: flex;
            justify-content: center;
            align-items: center;
            width: calc(100% - 30px);
            height: calc(100% - 30px);
            position: absolute;
            backface-visibility: hidden;
            top: 15px;
            left: 15px;
            font-size: 14px;
            line-height: 1.4;
        }

        .card-front {
            background-color: white;
            color: #333;
        }

        .card-back {
            background-color: #333;
            color: #f8f9fa;
            transform: rotateY(180deg);
            visibility: hidden;
            border-radius: 10px;
            text-align: center;
        }

        .card-back h4 {
            margin: 0;
            font-size: 16px;
            font-weight: 500;
        }

        .navx {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #333;
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-buttons button {
            background-color: #555;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .nav-buttons button:hover {
            background-color: #777;
        }

        .play-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-title {
            font-weight: bold;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .modal-content h2 {
            margin-top: 0;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .modal-buttons button:first-child {
            background-color: #4CAF50;
            color: white;
        }

        .modal-buttons button:last-child {
            background-color: #2196F3;
            color: white;
        }
    </style>

        function playFlipSound() {
            if (isMuted) return;
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                console.log('Audio no disponible');
            }
        }

                card.className = 'card';

                // Front de la tarjeta (pregunta)
                const cardFront = document.createElement('div');
                cardFront.className = 'card-face card-front';
                const question = document.createElement('h3');
                const pregunta = currentLang === 'en' && item.pregunta_en ? item.pregunta_en : item.pregunta;
                // index badge span
                const indexSpan = document.createElement('span');
                indexSpan.className = 'card-index';
                indexSpan.textContent = index + 1;
                cardFront.appendChild(indexSpan);
                question.textContent = pregunta;
                question.style.margin = '2';
                cardFront.appendChild(question);

                card.appendChild(cardFront);

                // Back de la tarjeta (respuesta correcta)
                const cardBack = document.createElement('div');
                cardBack.className = 'card-face card-back';
                const answer = document.createElement('h4');
                const respuestas = currentLang === 'en' && item.Respuesta_en ? item.Respuesta_en : item.Respuesta;
                const correctAnswer = respuestas.find(resp => resp.startsWith('*')).replace('*', '');
                answer.textContent = correctAnswer;
                cardBack.appendChild(answer);
                card.appendChild(cardBack);

                // Evento click para voltear la tarjeta
                card.addEventListener('click', () => {
                    playFlipSound();
                    // if (card.flipTimeout) clearTimeout(card.flipTimeout);
                    card.classList.toggle('flipped');
                    if (card.classList.contains('flipped')) {
                        cardFront.style.visibility = 'hidden';
                        cardBack.style.visibility = 'visible';
                        /*  card.flipTimeout = setTimeout(() => {
                              card.classList.remove('flipped');
                              cardBack.style.visibility = 'hidden';
                              cardFront.style.visibility = 'visible';
                              card.flipTimeout = null;
                          }, 5000);
                          */
                    } else {
                        setTimeout(() => {
                            cardFront.style.visibility = 'visible';
                            cardBack.style.visibility = 'hidden';
                        }, 300);
                    }
                });
                container.appendChild(card);
            });
        }

        document.getElementById('btnaudio').addEventListener('click', () => {
            isMuted = !isMuted;
            const btnAudio = document.getElementById('btnaudio');
            if (isMuted) {
                btnAudio.textContent = '🔇 Audio';
                btnAudio.style.backgroundColor = '#999';
            } else {
                btnAudio.textContent = '🔊 Audio';
                btnAudio.style.backgroundColor = '#555';
            }
        });

        document.getElementById('language-toggle').addEventListener('click', () => {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            renderCards();
        });

        window.addEventListener('load', () => {
            document.getElementById('language-modal').style.display = 'flex';
        });

        document.getElementById('modal-spanish').addEventListener('click', () => {
            currentLang = 'es';
            document.getElementById('language-modal').style.display = 'none';
            renderCards();
        });

        document.getElementById('modal-english').addEventListener('click', () => {
            currentLang = 'en';
            document.getElementById('language-modal').style.display = 'none';
            renderCards();
        });



    </script>



</body>

</html>
